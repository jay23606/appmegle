<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>appmegle</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <link rel="icon" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <style>
        * { box-sizing: border-box; }
        :root { --bg: #111; --fg: #eee; --bar: #1a1a1a; --stage: #000; --muted: #9ad; }
        body.light { --bg: #fff; --fg: #111; --bar: #e6e6e6; --stage: #f0f0f0; --muted: #357; }
        body { margin: 0; background: var(--bg); color: var(--fg); font-family: system-ui, sans-serif; height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        #videos { position: relative; flex: 1; min-height: 0; background: var(--stage); overflow: hidden; }
        #videos video.big { width: 100%; height: 100%; object-fit: contain; }
        #remote-video:not([data-live]) { opacity: .25; }
        #videos video.pip { position: absolute; top: 12px; right: 12px; width: 22%; max-width: 220px; aspect-ratio: 4/3; object-fit: contain; background: var(--stage); border: 2px solid rgba(128,128,128,.6); border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.5); z-index: 3; cursor: pointer; }
        #controls { position: absolute; left: 0; right: 0; top: 0; z-index: 4; display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: linear-gradient(to bottom, rgba(0,0,0,.5), transparent); opacity: 0; transition: opacity .2s; pointer-events: none; }
        #videos:hover #controls { opacity: 1; pointer-events: auto; }
        #vol { width: 130px; accent-color: #c9a6ff; cursor: pointer; }
        @media (hover: none) { #controls { opacity: 1; pointer-events: auto; } #share { display: none; } }
        /* phones: bigger pip, portrait box to match phone cameras */
        @media (max-width: 640px) { #videos video.pip { width: 34%; aspect-ratio: 3/4; top: 8px; right: 8px; border-radius: 6px; } }
        #bar { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px; background: var(--bar); align-items: center; }
        #stat { font-size: 14px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        button { background: #2a6; color: #fff; border: 0; padding: 10px 16px; font-size: 15px; border-radius: 6px; cursor: pointer; }
        button:disabled { background: #444; cursor: default; }
        #stop { background: #a33; }
        #toggle-chat { background: #357; }
        #toggle-chat.unread { background: #c63; }
        #chat { position: absolute; left: 0; right: 0; bottom: 0; z-index: 2; display: flex; flex-direction: column; height: 40%; max-height: 320px; background: linear-gradient(to top, rgba(0,0,0,.65), rgba(0,0,0,.25)); backdrop-filter: blur(2px); }
        #chat.hidden { display: none; }
        #log { flex: 1; overflow-y: auto; padding: 8px 10px; display: flex; flex-direction: column; gap: 4px; font-size: 14px; text-shadow: 0 1px 2px #000; }
        #log .me { color: #7df; } #log .them { color: #fd7; } #log .sys { color: #bbb; font-style: italic; }
        #msg { border: 0; background: rgba(20,20,20,.7); color: #eee; padding: 10px; font-size: 15px; border-radius: 6px; margin: 0 8px 8px; }
        #msg:disabled { color: #777; }

        /* ---- generic app host: apps render into #app-stage and bring their own CSS ---- */
        #app-stage { position: absolute; inset: 0; z-index: 3; display: none; align-items: center; justify-content: center; pointer-events: none; }
        #app-stage.open { display: flex; }
        #app-select { background: #2a2a2a; color: #fff; border: 0; padding: 10px 12px; font-size: 15px; border-radius: 6px; cursor: pointer; }
        #app-select:disabled { background: #444; color: #888; cursor: default; }
        /* shared helpers apps can use for a consistent status bar + buttons */
        .app-col { display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: auto; }
        .app-bar { display: flex; align-items: center; gap: 10px; width: 100%; padding: 0 4px; text-shadow: 0 1px 3px #000; }
        .app-bar .stat { flex: 1; font-size: 14px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-btn { padding: 6px 10px; font-size: 13px; border: 0; border-radius: 6px; color: #fff; background: rgba(0,0,0,.5); cursor: pointer; }
        .app-loading { font-size: 15px; color: #fff; text-shadow: 0 1px 4px #000; background: rgba(0,0,0,.5); padding: 10px 18px; border-radius: 10px; pointer-events: auto; }

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        // ---- Supabase (shared event-mgmt project; anon publishable key + RLS) ----
        const SUPABASE_URL = 'https://zbtgonklxweikgukzukg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Tpkd3FzWhsfldMll-gIqfg_74YVroef';
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

        // ---- helpers (same spirit as the inspo repos) ----
        const $ = (id, props) => { const e = document.getElementById(id); if (props) Object.assign(e, props); return e; };
        const rand = () => Math.random().toString(36).slice(2);
        Element.prototype.on = function (e, fn) { this.addEventListener(e, fn); return this; };

        // Our anonymous identity for this session — both our lobby slot and our
        // signal-channel address. Replaces PeerJS's random peer.id.
        const clientId = (crypto.randomUUID ? crypto.randomUUID() : rand() + rand());

        // ===================== WebRTC over Supabase Realtime (no PeerJS) =====================
        // The offer/answer/ICE handshake rides Supabase Realtime Broadcast, keyed by clientId.
        // Media/data still flow directly browser-to-browser once connected. STUN only (no TURN).
        const ICE = { iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:global.stun.twilio.com:3478' },
        ] };
        let signalCh = null;
        let onDataConn = null, onMediaConn = null;   // incoming handlers (were peer.on('connection'/'call'))
        const conns = new Map();                     // cid -> { handleSignal }
        const signalSend = (to, m) => { try { signalCh && signalCh.send({ type: 'broadcast', event: 'sig', payload: { to, from: clientId, ...m } }); } catch (e) {} };
        const emitter = () => { const L = {}; return {
            on(ev, fn) { (L[ev] || (L[ev] = [])).push(fn); return this; },
            emit(ev, ...a) { (L[ev] || []).forEach(f => f(...a)); },
        }; };

        // Reliable, ordered data connection — same surface the app (and every apps/*.js) used from PeerJS.
        const makeDataConn = (remote, cid, initiator, metadata) => {
            const ev = emitter(); const pc = new RTCPeerConnection(ICE);
            let dc, remoteSet = false, closed = false; const pend = [];
            const fireClose = () => { if (closed) return; closed = true; api.open = false; conns.delete(cid); ev.emit('close'); };
            const api = {
                peer: remote, metadata, open: false, peerConnection: pc,
                on(e, fn) { ev.on(e, fn); return api; },
                send(o) { try { if (dc && dc.readyState === 'open') dc.send(JSON.stringify(o)); } catch (e) {} },
                close() { try { dc && dc.close(); } catch (e) {} try { pc.close(); } catch (e) {} conns.delete(cid); },
            };
            const wireDC = (ch) => {
                dc = ch;
                dc.onopen = () => { api.open = true; ev.emit('open'); };
                dc.onmessage = (m) => { let d; try { d = JSON.parse(m.data); } catch (e) { d = m.data; } ev.emit('data', d); };
                dc.onclose = fireClose;
            };
            pc.onicecandidate = (e) => { if (e.candidate) signalSend(remote, { cid, kind: 'data', ice: e.candidate }); };
            pc.onconnectionstatechange = () => { if (['failed', 'disconnected', 'closed'].includes(pc.connectionState)) fireClose(); };
            if (initiator) {
                wireDC(pc.createDataChannel('d'));
                pc.createOffer().then(o => pc.setLocalDescription(o))
                  .then(() => signalSend(remote, { cid, kind: 'data', sdp: pc.localDescription, metadata }));
            } else { pc.ondatachannel = (e) => wireDC(e.channel); }
            conns.set(cid, { handleSignal: async (m) => {
                if (m.sdp) {
                    await pc.setRemoteDescription(m.sdp); remoteSet = true;
                    pend.splice(0).forEach(c => pc.addIceCandidate(c).catch(() => {}));
                    if (m.sdp.type === 'offer') { await pc.setLocalDescription(await pc.createAnswer()); signalSend(remote, { cid, kind: 'data', sdp: pc.localDescription }); }
                } else if (m.ice) { remoteSet ? pc.addIceCandidate(m.ice).catch(() => {}) : pend.push(m.ice); }
            } });
            return api;
        };

        // Media (video call) connection. The app answers via api.answer(stream); we only
        // set the remote description in handleSignal so answer() always has an offer to reply to.
        const makeMediaConn = (remote, cid, initiator, metadata, stream) => {
            const ev = emitter(); const pc = new RTCPeerConnection(ICE);
            let remoteSet = false, closed = false; const pend = [];
            const fireClose = (isErr) => { if (closed) return; closed = true; conns.delete(cid); ev.emit(isErr ? 'error' : 'close'); };
            const addTracks = (s) => s.getTracks().forEach(t => pc.addTrack(t, s));
            const api = {
                peer: remote, metadata, peerConnection: pc,
                on(e, fn) { ev.on(e, fn); return api; },
                answer: async (s) => { addTracks(s); await pc.setLocalDescription(await pc.createAnswer()); signalSend(remote, { cid, kind: 'media', sdp: pc.localDescription }); },
                close() { try { pc.close(); } catch (e) {} conns.delete(cid); },
            };
            pc.onicecandidate = (e) => { if (e.candidate) signalSend(remote, { cid, kind: 'media', ice: e.candidate }); };
            pc.ontrack = (e) => ev.emit('stream', e.streams[0]);
            pc.onconnectionstatechange = () => {
                if (pc.connectionState === 'failed') fireClose(true);
                else if (['disconnected', 'closed'].includes(pc.connectionState)) fireClose(false);
            };
            if (initiator) {
                addTracks(stream);
                pc.createOffer().then(o => pc.setLocalDescription(o))
                  .then(() => signalSend(remote, { cid, kind: 'media', sdp: pc.localDescription, metadata }));
            }
            conns.set(cid, { handleSignal: async (m) => {
                if (m.sdp) { await pc.setRemoteDescription(m.sdp); remoteSet = true; pend.splice(0).forEach(c => pc.addIceCandidate(c).catch(() => {})); }
                else if (m.ice) { remoteSet ? pc.addIceCandidate(m.ice).catch(() => {}) : pend.push(m.ice); }
            } });
            return api;
        };

        // PeerJS-shaped facade so the rest of the app is unchanged (target by clientId).
        const peer = {
            id: clientId,
            connect: (id, opts = {}) => makeDataConn(id, rand(), true, opts.metadata),
            call: (id, stream, opts = {}) => makeMediaConn(id, rand(), true, opts.metadata, stream),
            on(ev, fn) { if (ev === 'connection') onDataConn = fn; else if (ev === 'call') onMediaConn = fn; return peer; },
        };

        // Dispatch an incoming signaling message to its connection (or create one on offer).
        // For a fresh offer we set the remote description BEFORE handing the conn to the app,
        // so an auto-answering handler (appmegle answers immediately) has an offer to reply to.
        const onSignal = async (p) => {
            if (!p || p.to !== clientId) return;
            let entry = conns.get(p.cid), fresh = null;
            if (!entry) {
                if (!p.sdp || p.sdp.type !== 'offer') return;   // stray candidate/answer for a dead conn
                if (p.kind === 'data') fresh = { c: makeDataConn(p.from, p.cid, false, p.metadata), cb: onDataConn };
                else if (p.kind === 'media') fresh = { c: makeMediaConn(p.from, p.cid, false, p.metadata), cb: onMediaConn };
                entry = conns.get(p.cid);
            }
            if (entry) await entry.handleSignal(p);
            if (fresh && fresh.cb) fresh.cb(fresh.c);
        };

        const startRtc = () => new Promise((resolve) => {
            signalCh = sb.channel('appmegle-signal', { config: { broadcast: { self: false } } });
            signalCh.on('broadcast', { event: 'sig' }, ({ payload }) => onSignal(payload));
            signalCh.subscribe((status) => { if (status === 'SUBSCRIBED') resolve(); });
        });

        // ---- Realtime presence: the live "N online" count ----
        // Subscribed at boot so the count is visible before you Start; we only track()
        // ourselves into it once you Start (so the count reflects people actually in the pool).
        let presenceCh = null;
        const startPresence = () => {
            presenceCh = sb.channel('appmegle-presence', { config: { presence: { key: clientId } } });
            presenceCh.on('presence', { event: 'sync' }, () => {
                online.textContent = Object.keys(presenceCh.presenceState()).length + ' online';
            });
            presenceCh.subscribe();
        };
        const enterPresence = () => { presenceCh && presenceCh.track({ t: Date.now() }); };
        const leavePresence = () => { presenceCh && presenceCh.untrack(); };

        // ---- config / state ----
        let localStream, call, conn, partner, searching = false, started = false, screenStream = null, myCountry = '';
        let searchTimer = null, typingTimer = null, typingShown = false, pairTimer = null, searchStart = 0;
        let amCaller = false;                       // caller is "player 1" (e.g. White in chess), answerer is "player 2"
        const MATCH_TIMEOUT = 30000;   // ms before "still looking" nudge
        const POLL = 3000;             // ms between lobby re-checks while waiting
        const PAIR_TIMEOUT = 12000;    // ms to give a claimed stranger to connect before re-searching

        const go = $('go'), stop = $('stop'), msg = $('msg'),
              stat = $('stat'), log = $('log'), localVideo = $('local-video'), remoteVideo = $('remote-video'),
              online = $('online'), chat = $('chat'), toggleChat = $('toggle-chat'), typing = $('typing'), share = $('share'), country = $('country'),
              appSelect = $('app-select'), appStage = $('app-stage');

        // ---- lobby (Supabase table + atomic claim RPC; replaces Firebase transaction) ----
        const leaveLobby = () => { sb.from('appmegle_lobby').delete().eq('client_id', clientId); };
        const leave = () => { leaveLobby(); leavePresence(); };

        const say = (t) => stat.textContent = t;
        const line = (text, cls) => {
            const d = document.createElement('div'); d.className = cls; d.textContent = text;
            log.appendChild(d); log.scrollTop = log.scrollHeight;
            if (cls === 'them' && chat.classList.contains('hidden')) toggleChat.classList.add('unread');
        };
        const clearLog = () => log.innerHTML = '';
        const send = (d) => { try { conn && conn.send(d); } catch (e) {} };

        // ======================================================================
        //  Appmegle — tiny plugin host for in-call apps. An app file under apps/
        //  calls Appmegle.register({ id, label, css, mount, unmount, onData }).
        //
        //   - The dropdown is built from the manifest below; app code + CSS are
        //     LAZY-LOADED the first time an app is opened (by either peer), so
        //     page load stays light no matter how many apps exist.
        //   - Selecting an app from the "-- Apps --" dropdown opens it for BOTH
        //     peers; selecting "-- Apps --" closes it for both.
        //   - mount(ctx) gets { root, send, amCaller }. ctx.send(obj) delivers a
        //     JSON message to the other peer's matching app via onData(obj).
        //   - Messages that arrive while our copy is still downloading are
        //     buffered and replayed right after mount (the peer's app often
        //     sends its first sync the instant it mounts).
        //   - Adding an app = drop apps/<name>.js (+ optional .css) and add one
        //     line to this manifest. No script tags needed.
        // ======================================================================
        window.Appmegle = {

            { id: "qubic", label: "3D Tic-Tac-Toe", src: "apps/qubic.js" },

            { id: "tron", label: "Tron", src: "apps/tron.js" },
            { id: "truthdare", label: "Truth or Dare", src: "apps/truthdare.js" },
            { id: "tunnel", label: "Tunnel Flyer (3D)", src: "apps/tunnel.js" },
            { id: "twotruths", label: "Two Truths & a Lie", src: "apps/twotruths.js" },
            { id: "escape", label: "Two-Key Escape Room", src: "apps/escape.js" },
            { id: "uno", label: "Uno", src: "apps/uno.js" },
            { id: "puzzle", label: "Video Puzzle", src: "apps/puzzle.js" },
            { id: "watch", label: "Watch Together", src: "apps/watch.js" },
            { id: "wavelength", label: "Wavelength", src: "apps/wavelength.js" },
            { id: "volley", label: "Webcam Volleyball", src: "apps/volley.js" },
            { id: "whatsound", label: "What's That Sound?", src: "apps/whatsound.js" },
            { id: "whiteboard", label: "Whiteboard", src: "apps/whiteboard.js" }
            ],
            _apps: {},
            _loading: {},
            _active: null,      // the app that SHOULD be open (reserved at select time)
            _mounted: null,     // the app whose mount() has actually run
            _pending: null,     // peer messages buffered while _active is still loading
            _buildMenu() {
                for (const m of this._manifest) {
                    const opt = document.createElement('option');
                    opt.value = m.id; opt.textContent = m.label;
                    appSelect.appendChild(opt);
                }
            },
            register(app) {     // called by an app file when its script executes
                this._apps[app.id] = app;
                if (app.css && !document.querySelector('link[data-app="' + app.id + '"]')) {
                    const l = document.createElement('link');
                    l.rel = 'stylesheet'; l.href = app.css; l.dataset.app = app.id;
                    document.head.appendChild(l);
                }
            },
            _load(id) {
                if (this._apps[id]) return Promise.resolve();
                if (this._loading[id]) return this._loading[id];
                const entry = this._manifest.find(m => m.id === id);
                if (!entry) return Promise.reject(new Error('unknown app ' + id));
                this._loading[id] = new Promise((resolve, reject) => {
                    const s = document.createElement('script');
                    s.src = entry.src;
                    s.onload = () => this._apps[id] ? resolve() : reject(new Error(id + ' did not register'));
                    s.onerror = () => { delete this._loading[id]; s.remove(); reject(new Error(id + ' failed to load')); };
                    document.body.appendChild(s);
                });
                return this._loading[id];
            },
            _cssReady(app) {    // let the stylesheet land before first paint (bounded wait)
                const l = app.css && document.querySelector('link[data-app="' + app.id + '"]');
                if (!l || l.dataset.ready) return Promise.resolve();
                return new Promise(res => {
                    const done = () => { l.dataset.ready = 1; res(); };
                    l.addEventListener('load', done, { once: true });
                    l.addEventListener('error', done, { once: true });
                    setTimeout(done, 1500);
                });
            },
            open(id, broadcast) {
                if (this._active === id) return;            // already open (e.g. echo of our own open)
                if (this._active) this.close(false);        // only one app at a time, for now
                this._active = id;
                appSelect.value = id;
                if (broadcast) send({ app: 'host', t: 'open', id });   // tell the peer NOW so both sides download in parallel
                this._pending = [];
                appStage.classList.add('open');
                appStage.innerHTML = '<div class="app-loading">loading…</div>';
                this._load(id).then(() => this._cssReady(this._apps[id])).then(() => {
                    if (this._active !== id) return;        // closed or switched while downloading
                    const app = this._apps[id];
                    appStage.innerHTML = '';
                    app.mount({ root: appStage, send: (o) => send(Object.assign({ app: id }, o)), amCaller });
                    this._mounted = id;
                    const q = this._pending || []; this._pending = null;
                    if (app.onData) q.forEach(m => { try { app.onData(m); } catch (e) {} });
                }).catch(() => {
                    if (this._active !== id) return;
                    appStage.innerHTML = '<div class="app-loading">couldn\'t load that app 😕</div>';
                    setTimeout(() => { if (this._active === id) this.close(true); }, 1600);
                });
            },
            close(broadcast) {
                const app = this._mounted && this._apps[this._mounted];
                if (app && app.unmount) try { app.unmount(); } catch (e) {}
                appStage.classList.remove('open');
                appStage.innerHTML = '';
                this._active = null;
                this._mounted = null;
                this._pending = null;
                appSelect.value = '';
                if (broadcast) send({ app: 'host', t: 'close' });
            },
            data(msg) {                                     // an object message arrived on the data channel
                if (msg.app === 'host') {
                    if (msg.t === 'open') this.open(msg.id, false);
                    else if (msg.t === 'close') this.close(false);
                    return;
                }
                if (this._active !== msg.app) return;
                if (this._mounted === msg.app) {
                    const app = this._apps[msg.app];
                    if (app && app.onData) app.onData(msg);
                } else if (this._pending) this._pending.push(msg);   // still downloading — replay after mount
            }
        };
        Appmegle._buildMenu();

        appSelect.on('change', () => {
            const id = appSelect.value;
            if (id) Appmegle.open(id, true); else Appmegle.close(true);
        });

        // fetch our own country once (city/region deliberately not used); tries providers in order
        const flag = (cc) => cc.toUpperCase().replace(/./g, c => String.fromCodePoint(127397 + c.charCodeAt()));
        const providers = [
            { url: 'https://ipwho.is/', pick: j => j.country_code && { code: j.country_code, name: j.country } },
            { url: 'https://ipapi.co/json/', pick: j => j.country_code && { code: j.country_code, name: j.country_name } },
            { url: 'https://get.geojs.io/v1/ip/country.json', pick: j => j.country && { code: j.country, name: j.name || j.country } }
        ];
        const sendCountry = () => { if (myCountry && conn) send('__country__' + myCountry); };
        const fetchCountry = async () => {
            for (const p of providers) {
                try {
                    const r = await fetch(p.url);
                    const got = r.ok && p.pick(await r.json());
                    if (got) {
                        myCountry = flag(got.code) + ' ' + got.name;
                        if (!partner) country.textContent = 'You: ' + myCountry;
                        sendCountry();   // in case we connected before the fetch finished
                        return;
                    }
                } catch (e) {}
            }
        };
        fetchCountry();

        // ---- media ----
        const getMedia = () => navigator.mediaDevices.getUserMedia({ video: true, audio: true });

        // ---- connection wiring (works whether we called or were called) ----
        const watchIce = (c) => {
            const pc = c.peerConnection;
            if (!pc) return;
            pc.oniceconnectionstatechange = () => {
                const s = pc.iceConnectionState;
                if (s === 'checking') say('Connecting…');
                else if (s === 'connected' || s === 'completed') say('Connected');
                else if (s === 'disconnected') say('Connection unstable…');
                else if (s === 'failed') { say('Connection failed'); partnerGone(); }
            };
        };
        const wireCall = (c) => {
            call = c;
            c.on('stream', (s) => { remoteVideo.srcObject = s; remoteVideo.dataset.live = '1'; clearTimeout(pairTimer); });
            c.on('close', partnerGone);
            c.on('error', partnerGone);
            watchIce(c);
        };
        const showTyping = (on) => {
            typingShown = on;
            typing.style.display = on ? '' : 'none';
        };

        const wireConn = (c) => {
            conn = c;
            c.on('data', (d) => {
                if (d && typeof d === 'object') return Appmegle.data(d);   // app/host messages travel as objects
                if (d === '__next__') return partnerGone();
                if (d === '__typing__') return showTyping(true);
                if (d === '__stoptyping__') return showTyping(false);
                if (d.startsWith && d.startsWith('__country__')) { const cn = d.slice(11); country.textContent = cn; return line('Stranger is from ' + cn, 'sys'); }
                showTyping(false);
                line('Stranger: ' + d, 'them');
            });
            c.on('open', () => { msg.disabled = false; sendCountry(); });
            c.on('close', partnerGone);
        };

        const connectTo = (id) => {                 // we are the caller → we are player 1
            partner = id;
            amCaller = true;
            wireConn(peer.connect(id, { reliable: true, serialization: 'json' }));
            wireCall(peer.call(id, localStream));
            paired();
            // dead-claim guard: the claimed stranger may already be gone (no Firebase
            // onDisconnect). If nothing connects, drop them and look again.
            clearTimeout(pairTimer);
            pairTimer = setTimeout(() => {
                if (partner === id && !remoteVideo.dataset.live) { cleanupPartner(); search(); }
            }, PAIR_TIMEOUT);
        };

        const paired = () => {
            searching = false; searchStart = 0;
            leaveLobby();                          // clear any lingering self-slot
            clearTimeout(searchTimer);
            clearLog();
            remoteVideo.className = 'big'; localVideo.className = 'pip';   // reset swap
            country.textContent = '';   // clears "You: ..."; stranger's country fills in on data
            line('You are now chatting with a stranger.', 'sys');
            say('Connected');
            go.textContent = 'Next'; go.disabled = false; stop.disabled = false; msg.disabled = false;
            share.disabled = false;
            appSelect.disabled = false;
        };

        const partnerGone = () => {
            if (!partner) return;
            line('Stranger has disconnected.', 'sys');
            cleanupPartner();
            if (stop.disabled) return;              // we stopped fully
            search();                               // auto-find someone new
        };

        const cleanupPartner = () => {
            partner = null;
            clearTimeout(pairTimer);
            country.textContent = '';
            showTyping(false); clearTimeout(typingTimer);
            if (screenStream) stopShare();
            share.disabled = true;
            Appmegle.close(false);                  // tear down any running app with the old partner
            appSelect.disabled = true;
            remoteVideo.removeAttribute('data-live'); remoteVideo.srcObject = null;
            if (conn) { conn.close(); conn = null; }
            if (call) { call.close(); call = null; }
            msg.disabled = true;
        };

        // ---- matchmaking: atomically grab a waiting stranger, else advertise self ----
        // The claim + insert happen server-side in one RPC (FOR UPDATE SKIP LOCKED), so two
        // people searching at once can't grab the same stranger. While waiting we re-poll,
        // which also refreshes our slot's timestamp and breaks a rare two-empty-lobby tie.
        const search = async () => {
            searching = true;
            if (!searchStart) searchStart = Date.now();
            say(Date.now() - searchStart > MATCH_TIMEOUT ? 'Still looking… not many people around right now.' : 'Looking for a stranger…');
            clearTimeout(searchTimer);
            const { data, error } = await sb.rpc('claim_appmegle_partner', { my_id: clientId });
            if (!searching) return;                 // stopped or paired while awaiting
            if (error) { searchTimer = setTimeout(() => { if (searching) search(); }, POLL); return; }
            if (data) return connectTo(data);       // claimed a waiting stranger → we call them
            searchTimer = setTimeout(() => { if (searching) search(); }, POLL);   // waiting to be called
        };

        // someone claimed us → they will call us; just answer (we are player 2)
        const listen = () => {
            peer.on('call', (incoming) => {
                if (partner) return incoming.close();
                partner = incoming.peer;
                amCaller = false;
                incoming.answer(localStream);
                wireCall(incoming);
                paired();
            });
            peer.on('connection', (c) => { if (c.peer === partner || !conn) wireConn(c); });
        };

        // ---- buttons ----
        const startUp = async () => {
            go.disabled = true;
            try { localStream = await getMedia(); } catch (e) { say('Camera/mic blocked'); go.disabled = false; return; }
            localVideo.srcObject = localStream;
            started = true;
            await startRtc();
            enterPresence();
            listen(); search();
            go.textContent = 'Next'; go.disabled = false; stop.disabled = false;
        };

        const skip = () => {
            leaveLobby();
            if (partner) send('__next__');
            cleanupPartner();
            search();
        };

        go.on('click', () => started ? skip() : startUp());

        stop.on('click', () => {
            leave();
            cleanupPartner();
            searching = false; started = false; searchStart = 0;
            clearTimeout(searchTimer); clearTimeout(pairTimer);
            say('Stopped');
            line('You disconnected.', 'sys');
            go.textContent = 'Start'; go.disabled = false; stop.disabled = true;
        });

        const sendTyping = () => {
            if (!conn) return;
            send('__typing__');
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => send('__stoptyping__'), 1500);
        };

        msg.on('keypress', (e) => {
            if (e.key !== 'Enter' || !conn || !msg.value) return;
            clearTimeout(typingTimer);
            send('__stoptyping__');
            send(msg.value);
            line('You: ' + msg.value, 'me');
            msg.value = '';
        });
        msg.on('input', () => { if (msg.value) sendTyping(); });

        // Esc = Next (skip to a new stranger), once started
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && started && !go.disabled) { e.preventDefault(); skip(); }
        });

        const swapVideos = (e) => {
            if (!e.target.classList.contains('pip')) return;   // only the small one promotes
            [localVideo, remoteVideo].forEach(v => { v.classList.toggle('big'); v.classList.toggle('pip'); });
        };
        localVideo.on('click', swapVideos);
        remoteVideo.on('click', swapVideos);

        // ---- screen share: swap the outgoing video track without renegotiating ----
        const setVideoTrack = (track) => {
            if (!call || !call.peerConnection) return;
            const sender = call.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
            if (sender) sender.replaceTrack(track);
        };
        const stopShare = () => {
            if (!screenStream) return;
            screenStream.getTracks().forEach(t => t.stop());
            screenStream = null;
            const cam = localStream.getVideoTracks()[0];
            setVideoTrack(cam);
            localVideo.srcObject = localStream;
            share.textContent = 'Share'; share.style.background = '#736';
        };
        share.on('click', async () => {
            if (screenStream) return stopShare();
            try { screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true }); }
            catch (e) { return; }                       // user cancelled the picker
            const track = screenStream.getVideoTracks()[0];
            track.onended = stopShare;                   // native "Stop sharing" button
            setVideoTrack(track);
            localVideo.srcObject = screenStream;         // preview your own share
            share.textContent = 'Stop Share'; share.style.background = '#a33';
        });

        $('vol').on('input', (e) => { remoteVideo.volume = e.target.value; });

        $('theme').on('click', (e) => {
            const light = document.body.classList.toggle('light');
            e.target.textContent = light ? '☀️' : '🌙';
        });

        toggleChat.on('click', () => {
            chat.classList.toggle('hidden');
            const open = !chat.classList.contains('hidden');
            if (open) { toggleChat.classList.remove('unread'); if (!msg.disabled) msg.focus(); }
        });

        // clean up our lobby slot + presence if the tab closes
        window.addEventListener('beforeunload', leave);

        // watch the live count from the start (you're only counted once you Start)
        startPresence();

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
    </script>

    <!-- in-call app files are lazy-loaded by the Appmegle host from its manifest — no script tags here. -->
</body>
</html>
